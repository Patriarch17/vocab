<title>Vocab Trainer</title>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1a2233; --mut:#6b7686; --line:#e3e8ef;
  --acc:#2563eb; --acc-ink:#ffffff; --ok:#16a34a; --bad:#dc2626; --warn:#d97706;
  --soft:#eef2f8; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
  --r:14px;
}
@media (prefers-color-scheme: dark){ :root:not([data-theme=light]){
  --bg:#0f1420; --card:#171e2e; --ink:#e8edf6; --mut:#8b96a8; --line:#26304a;
  --soft:#1d2639; --shadow:0 1px 3px rgba(0,0,0,.4);
}}
:root[data-theme=dark]{ --bg:#0f1420; --card:#171e2e; --ink:#e8edf6; --mut:#8b96a8; --line:#26304a; --soft:#1d2639; --shadow:0 1px 3px rgba(0,0,0,.4); }
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:16px/1.5 -apple-system,"Segoe UI",Roboto,Arial,sans-serif;}
.wrap{max-width:880px;margin:0 auto;padding:16px 16px 90px;}
.topbar{display:flex;gap:6px;align-items:center;padding:10px 0 14px;flex-wrap:wrap}
.tab{border:0;background:transparent;color:var(--mut);font:600 15px/1 inherit;padding:9px 14px;border-radius:10px;cursor:pointer}
.tab.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.spacer{flex:1}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;border:1px solid var(--line)}
h1{font-size:22px;margin:0 0 6px} h2{font-size:17px;margin:0 0 10px} h3{font-size:15px;margin:0 0 8px}
.mut{color:var(--mut)} .small{font-size:13px} .b{font-weight:700}
.btn{border:0;border-radius:11px;padding:11px 18px;font:600 15px/1 inherit;cursor:pointer;background:var(--soft);color:var(--ink)}
.btn.pri{background:var(--acc);color:var(--acc-ink)}
.btn.big{font-size:17px;padding:14px 26px}
.btn.ghost{background:transparent;border:1px solid var(--line)}
.btn:disabled{opacity:.45;cursor:default}
.btn.ok{background:var(--ok);color:#fff}.btn.bad{background:var(--bad);color:#fff}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
.stat{display:flex;flex-direction:column;gap:2px;padding:12px 16px;background:var(--soft);border-radius:12px;min-width:110px}
.stat .n{font-size:24px;font-weight:800} .stat .l{font-size:12px;color:var(--mut)}
.pbar{height:6px;background:var(--soft);border-radius:4px;overflow:hidden;margin:8px 0}
.pbar>div{height:100%;background:var(--acc);transition:width .25s}
.opt{display:block;width:100%;text-align:left;margin:7px 0;padding:13px 15px;border-radius:11px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font:500 15.5px/1.4 inherit;cursor:pointer}
.opt:hover{border-color:var(--acc)}
.opt.sel{border-color:var(--acc);background:var(--soft)}
.opt.right{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,var(--card))}
.opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 12%,var(--card))}
.opt .k{display:inline-block;min-width:20px;color:var(--mut);font-weight:700}
.headword{font-size:38px;font-weight:800;letter-spacing:.2px;margin:2px 0 2px}
.trans{color:var(--mut);font-size:16px}
.sentence{font-size:19px;line-height:1.65;margin:10px 0}
.gap{display:inline-block;min-width:90px;border-bottom:2px solid var(--acc);text-align:center;padding:0 6px;font-weight:700}
.inp{width:100%;padding:13px 15px;font:600 18px/1.3 inherit;border-radius:11px;border:1.5px solid var(--line);background:var(--card);color:var(--ink)}
.inp:focus{outline:none;border-color:var(--acc)}
.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.tag{padding:8px 13px;border-radius:10px;background:var(--soft);border:1.5px solid var(--line);cursor:pointer;font:600 14.5px/1 inherit;color:var(--ink)}
.tag.used{opacity:.35;text-decoration:line-through;cursor:default}
.tag.sel{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 14%,var(--card))}
.sound{border:1px solid var(--line);background:var(--soft);border-radius:9px;padding:6px 11px;cursor:pointer;font-size:15px;color:var(--ink)}
.fb{margin-top:12px;padding:13px 15px;border-radius:11px;font-weight:600}
.fb.ok{background:color-mix(in srgb,var(--ok) 14%,var(--card));color:var(--ok)}
.fb.bad{background:color-mix(in srgb,var(--bad) 12%,var(--card));color:var(--bad)}
.fb.warn{background:color-mix(in srgb,var(--warn) 14%,var(--card));color:var(--warn)}
.bottom{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;justify-content:center;z-index:5}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dictrow{display:flex;gap:10px;align-items:center;padding:10px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.badge{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--soft);color:var(--mut);white-space:nowrap}
.heat{display:flex;gap:3px;flex-wrap:wrap}
.heat i{width:13px;height:13px;border-radius:3px;background:var(--soft);display:block}
.heat i.a1{background:color-mix(in srgb,var(--acc) 35%,var(--soft))}
.heat i.a2{background:color-mix(in srgb,var(--acc) 65%,var(--soft))}
.heat i.a3{background:var(--acc)}
.modal{position:fixed;inset:0;background:rgba(10,14,22,.55);display:flex;align-items:center;justify-content:center;z-index:20;padding:16px}
.modal>.card{max-width:560px;width:100%;max-height:86vh;overflow:auto}
table.t{width:100%;border-collapse:collapse;font-size:14px}
table.t td,table.t th{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
.senseTag{font-size:12px;font-weight:700;color:var(--acc);background:color-mix(in srgb,var(--acc) 12%,var(--card));border-radius:6px;padding:2px 7px;margin-left:6px}
kbd{background:var(--soft);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px}
.story{font-size:17.5px;line-height:1.9}
select.gapsel{font:600 15px/1.2 inherit;padding:4px 8px;border-radius:8px;border:1.5px solid var(--acc);background:var(--card);color:var(--ink)}
.packgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:10px}
.pack{border:1.5px solid var(--line);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:6px;background:var(--card)}
.pack.new{border-style:dashed}
.pack.srs{opacity:.85}
.pack.test{border-color:var(--warn)}
.pack.resume{border-color:var(--acc)}
.stage{min-height:calc(100vh - 230px);display:flex;flex-direction:column}
.stage .actions{margin-top:auto;padding-top:14px}
.stepper{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;gap:4px;justify-content:center;padding:9px 10px;z-index:5;flex-wrap:wrap}
.stepper .step{font-size:12.5px;font-weight:600;color:var(--mut);padding:5px 11px;border-radius:8px;background:var(--soft)}
.stepper .step.cur{background:var(--acc);color:#fff}
.stepper .step.done{color:var(--ink);background:color-mix(in srgb,var(--acc) 18%,var(--soft))}
.headword{font-size:34px}
@media(max-width:520px){
  .wrap{padding:10px 10px 96px}
  .headword{font-size:27px}
  .sentence{font-size:17px}
  .card{padding:14px;border-radius:12px}
  .btn.big{width:100%;font-size:16px}
  .stat{min-width:calc(50% - 10px);padding:10px 12px}
  .stat .n{font-size:20px}
  .topbar .tab{padding:8px 10px;font-size:14px}
  .packgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .opt{padding:12px 12px;font-size:15px}
  .stepper .step{font-size:11px;padding:4px 8px}
  .pair{gap:6px}
  .pair .opt{font-size:13.5px;padding:10px 8px}
  .stage{min-height:calc(100dvh - 215px)}
}
@supports (min-height:100dvh){.stage{min-height:calc(100dvh - 230px)}}
.actionCol{display:flex;flex-direction:column;gap:10px;margin-top:16px;max-width:460px}
.actionCol .btn{width:100%}
.hidden{display:none!important}
a{color:var(--acc)}
</style>

  for(const a of activeUnitInfos()){
    if(unitFinished(a)||!a.day1)continue;
    const age=diffDays(a.introDate,dateISO);
    const ks=a.unit.items.filter(k=>ST(k).st==='learning');
    if(!a.testDone&&age>=1){
      for(const k of pick(ks.filter(k=>!learnDone(k)),6))tasks.push({kind:'learn',k,format:'cloze_hint'});
      duelTasks(tasks,a.unit,3);
      tasks.push({kind:'story',unit:a.unit.unit});
    }
  }
  return tasks;
}
function duelTasks(tasks,unit,n){
  let c=0;
  for(const k of unit.items){const it=IT(k);
    for(const ch of (it.confusables||[])){
      const k2=Object.keys(PACK.items).find(x=>PACK.items[x].head===ch);
      if(!k2)continue;const s1=ST(k),s2=ST(k2);
      if(['review','mastered'].includes(s2.st)&&s2.step>=1&&c<n){tasks.push({kind:'review',k,si:0,format:'duel',duelWith:k2});c++;}
    }}
}

/* ============ ПРОВЕРКА ВВОДА ============ */
function typedVerdict(k,si,input,target){
  const inp=norm(input).replace(/[.,!?;:]+$/,'');if(!inp)return {v:'empty'};
  const tol=s=>s.length<=12?1:2;
  const cands=[norm(target),norm(IT(k).head.replace(/\(.*?\)/g,'').replace(/\//g,' '))];
  for(const t of headToks(IT(k).head))for(const ir of (IRREG[t]||[]))cands.push(norm(target).replace(t,ir));
  for(const c of cands){if(inp===c)return {v:'ok'};if(!S.settings.strictTyping&&lev(inp,c)<=tol(c))return {v:'typo',fix:target};}
  for(const a of (IT(k).accept||[])){const na=norm(a);if(inp===na||(!S.settings.strictTyping&&lev(inp,na)<=1))return {v:'alt',want:target,got:a};}
  return {v:'wrong'};
}
/* ============ РЕНДЕР ФОРМАТОВ ============ */
const RU1=k=>IT(k).rus[0]||'';
function glossFor(k,si){if(isMulti(k)&&IT(k).sense_plan)return IT(k).sense_plan[si]||RU1(k);return IT(k).rus.slice(0,2).join('; ');}
function otherUnitGlosses(k,n){const u=unitOf(k);const pool=u.items.filter(x=>x!==k);return pick(pool,n).map(x=>RU1(x));}
function introducedHead(h){const key=Object.keys(PACK.items).find(x=>PACK.items[x].head===h);return !key||ST(key).st!=='inbox';}
function renderTask(t,box,doneCb){
  const k=t.k;let si=t.si||0;const started=Date.now();let unsure=false,hintUsed=false,snapshot=null;
  const wrapFb=(node)=>{box.appendChild(node);};
  function finish(signal,fbNode,answerText){
    snapshot=JSON.stringify(senseState(k,si));const itSnap=JSON.stringify({st:ST(k).st,learn:ST(k).learn});
    const ms=Date.now()-started;
    let sig=signal;
    if(signal==='ok'){const lim=(t.format==='cloze'||t.format==='ru_en'||t.format==='cloze_hint')?20000:8000;
      if(unsure)sig='unsure';else if(hintUsed)sig='hint';else if(ms>lim)sig='ok_slow';else sig='ok_fast';}
    const d=todayStr();const st=senseState(k,si);
    const firstToday=!(st.hist||[]).some(h=>h.d===d);
    if(firstToday){day(d).firstSeen++;if(sig!=='wrong')day(d).firstOk++;}
    day(d).done++;if(sig!=='wrong')day(d).ok++;
    applySignal(k,si,t.format,sig==='ok'?'ok_fast':sig,d);save();
    if(fbNode)wrapFb(fbNode);
    const bar=el('div','row');
    const undo=el('button','btn ghost','Отменить ответ');
    undo.onclick=()=>{Object.assign(senseState(k,si),JSON.parse(snapshot));const io=JSON.parse(itSnap);ST(k).st=io.st;ST(k).learn=io.learn;day(d).done--;if(sig!=='wrong')day(d).ok--;if(firstToday){day(d).firstSeen--;if(sig!=='wrong')day(d).firstOk--;}save();doneCb({redo:true});};
    const next=el('button','btn pri','Дальше &nbsp;⏎');
    next.onclick=()=>doneCb({wrong:sig==='wrong',k,si});
    bar.append(next,undo);box.appendChild(bar);
    box.dataset.answered='1';box._next=next;
  }
  const unsureBtn=()=>{const b=el('button','btn ghost small','Не уверен');b.onclick=()=>{unsure=!unsure;b.classList.toggle('sel');b.style.borderColor=unsure?'var(--warn)':'';};return b;};
  function mcq(options,rightIdx,prompt,sub){
    box.appendChild(el('div','mut small',sub||''));box.appendChild(prompt);
    const os=el('div');options.forEach((o,i)=>{const b=el('button','opt','<span class="k">'+(i+1)+'</span> '+esc(o));
      b.onclick=()=>{if(box.dataset.answered)return;
        [...os.children].forEach((c,j)=>{if(j===rightIdx)c.classList.add('right');});
        if(i===rightIdx){finish('ok',el('div','fb ok','Верно'));}
        else{b.classList.add('wrong');
          const chosen=options[i];const key2=Object.keys(PACK.items).find(x=>PACK.items[x].head===chosen||RU1(x)===chosen);
          if(key2){ST(k).confu=ST(k).confu||{};ST(k).confu[key2]=(ST(k).confu[key2]||0)+1;}
          finish('wrong',el('div','fb bad','Неверно. Правильный ответ: '+esc(options[rightIdx])));}
      };os.appendChild(b);});
    box.appendChild(os);box.appendChild(unsureBtn());
  }
  function typed(prompt,target,subEl,withHint){
    box.appendChild(prompt);if(subEl)box.appendChild(subEl);
    const inp=el('input','inp');inp.placeholder='Введите по-английски…';box.appendChild(inp);
    const row=el('div','row');row.appendChild(unsureBtn());
    if(withHint){const hb=el('button','btn ghost small','Подсказка');
      hb.onclick=()=>{hintUsed=true;hb.disabled=true;box.insertBefore(el('div','mut small','Начинается с «'+esc(target.trim()[0])+'», букв: '+target.replace(/[^A-Za-z']/g,'').length),inp);};
      row.appendChild(hb);}
    const okB=el('button','btn pri','Проверить');row.appendChild(okB);box.appendChild(row);
    const go=()=>{if(box.dataset.answered)return;const r=typedVerdict(k,si,inp.value,target);
      if(r.v==='empty')return;
      inp.disabled=true;
      if(r.v==='ok')finish('ok',el('div','fb ok','Верно: '+esc(target)));
      else if(r.v==='typo')finish('ok',el('div','fb warn','Засчитано, но проверьте написание: '+esc(r.fix)));
      else if(r.v==='alt')finish('ok',el('div','fb warn','Принято («'+esc(r.got)+'»), но здесь ждали: '+esc(r.want)));
      else finish('wrong',el('div','fb bad','Неверно. Ответ: '+esc(target)));};
    okB.onclick=go;inp.onkeydown=e=>{e.stopPropagation();if(e.key==='Enter')go();};setTimeout(()=>inp.focus(),50);
  }
  /* ---- по форматам ---- */
  const f=t.format;
  if(false){}
  else if(f==='mcq_rev'){
    const right=IT(k).head;
    const ds=(IT(k).distractors||[]).filter(d=>introducedHead(d));
    const opts=shuffle([right,...pick(ds.length>=3?ds:ds.concat(pick(unitOf(k).items.filter(x=>x!==k).map(x=>IT(x).head),3)),3)]);
    mcq(opts,opts.indexOf(right),el('div','headword',esc(glossFor(k,si))),'Выберите английский эквивалент');
  }
  else if(f==='sense_pick'){
    const si2=Math.random()<0.5?0:1;si=si2; /* сигнал уходит проверяемому значению */
    const ei=pickExample(k,si2);const ex=exsOf(k,si2)[ei];markShown(k,si2,ei);
    const opts=IT(k).sense_plan.slice();
    mcq(opts,si2,el('div','sentence',esc(ex.en)),'Какое значение реализовано в предложении?');
  }
  else if(f==='duel'){
    const k2=t.duelWith;const ei=pickExample(k,0);const ex=exsOf(k,0)[ei];markShown(k,0,ei);
    const g=buildGap(ex.en,IT(k).head);if(!g){t.format='mcq_rev';return renderTask(t,box,doneCb);}
    const opts=shuffle([IT(k).head,IT(k2).head,pick((IT(k).distractors||['option']),1)[0]]);
    mcq(opts,opts.indexOf(IT(k).head),el('div','sentence',esc(g.pre)+'<span class="gap">?</span>'+esc(g.post)),'Какое из похожих выражений здесь уместно?');
  }
  else if(f==='ru_en'&&senseState(k,si).step>=4){
    /* чистое воспроизведение по значению: контекст скрыт до ответа */
    const base=IT(k).head.replace(/\(.*?\)/g,'').trim();
    const pr=el('div','headword',esc(glossFor(k,si)));
    const sub=el('div','mut small','Введите английский эквивалент');
    typed(pr,base,sub,false);
  }
  else if(f==='cloze_hint'||f==='cloze'||f==='ru_en'){
    let ei,ex;
    if(forceEx==null&&f==='cloze'&&senseState(k,si).step>=4&&IT(k).holdout!=null){t.forceEx=IT(k).holdout;}
    if(t.forceEx!=null){ex=IT(k).examples[forceEx];ei=exsOf(k,si).indexOf(ex);if(ei<0){ei=pickExample(k,si);ex=exsOf(k,si)[ei];}}
    else{ei=pickExample(k,si);ex=exsOf(k,si)[ei];}
    markShown(k,si,Math.max(0,ei));
    const g=buildGap(ex.en,IT(k).head);
    if(!g){t.format='mcq_rev';return renderTask(t,box,doneCb);}
    const s=el('div','sentence',esc(g.pre)+'<span class="gap">…</span>'+esc(g.post));
    let sub=null;
    if(f==='ru_en')sub=el('div','trans','Слово: <b>'+esc(glossFor(k,si))+'</b>');
    if(f==='cloze_hint'){sub=el('div','mut small','Начинается с «'+esc(g.ans.trim()[0])+'», букв: '+g.ans.replace(/[^A-Za-z']/g,'').length);}
    typed(s,g.ans,sub,f==='cloze');
  }
  else if(f==='assembly'){
    const words=IT(k).head.replace(/\(.*?\)/g,'').replace(/\//g,' ').trim().split(/\s+/);
    if(words.length<3){t.format='mcq_rev';return renderTask(t,box,doneCb);}
    box.appendChild(el('div','mut small','Соберите выражение: <b>'+esc(glossFor(k,si))+'</b>'));
    const out=el('div','sentence');const pool=el('div','tagrow');let acc=[];
    shuffle(words.map((w,i)=>({w,i}))).forEach(o=>{const tg=el('button','tag',esc(o.w));
      tg.onclick=()=>{if(tg.classList.contains('used')||box.dataset.answered)return;tg.classList.add('used');acc.push(o.w);out.textContent=acc.join(' ');
        if(acc.length===words.length){if(acc.join(' ')===words.join(' '))finish('ok',el('div','fb ok','Верно'));
          else finish('wrong',el('div','fb bad','Порядок: '+esc(words.join(' '))));}};
      pool.appendChild(tg);});
    box.append(out,pool);box.appendChild(unsureBtn());
  }
  else {box.appendChild(el('div','mut','Формат '+f+' не поддержан'));finish('ok',null);}
  /* озвучка после ответа добавляется на фидбэк */
}

/* Банк с исчезающими словами и отменой выбора */
function wireBank(rows, tagRow, bank){
  const tagMap={};
  tagRow.innerHTML='';
  bank.forEach(h=>{const t=el('span','tag',esc(h));tagMap[h]=t;tagRow.appendChild(t);});
  function usedMap(){const u={};rows.forEach(r=>{if(r.sel.value)u[r.sel.value]=1;});return u;}
  function rebuild(){
    const u=usedMap();
    rows.forEach(r=>{
      const cur=r.sel.value;
      let html='<option value="">—</option>';
      bank.forEach(h=>{if(h===cur||!u[h])html+='<option'+(h===cur?' selected':'')+'>'+esc(h)+'</option>';});
      r.sel.innerHTML=html;r.sel.value=cur;
    });
    bank.forEach(h=>{tagMap[h].classList.toggle('used',!!u[h]);});
  }
  rows.forEach(r=>r.sel.addEventListener('change',rebuild));
  bank.forEach(h=>{tagMap[h].onclick=()=>{const r=rows.find(x=>x.sel.value===h);if(r){r.sel.value='';rebuild();}};});
  rebuild();
}
function wc(s){return (s.match(/[A-Za-z'’\-]+/g)||[]).length;}
/* выбор полновесного примера для блоков: минимум 8 слов, наименее показанный */
function pickLongExample(k,si){
  const exs=exsOf(k,si);const st=ST(k);
  const hoAbs=IT(k).holdout;const hoRel=hoAbs!=null?exs.indexOf(IT(k).examples[hoAbs]):-1;
  let cand=exs.map((e,i)=>({i,c:(st.shown&&st.shown[si+'_'+i])||0,long:wc(e.en)>=8}));
  if(hoRel>=0&&cand.length>2)cand=cand.filter(x=>x.i!==hoRel);
  const longs=cand.filter(x=>x.long);
  const pool=longs.length?longs:cand;
  pool.sort((a,b)=>a.c-b.c);
  return pool[0].i;
}

function renderMatch(keys,box,doneCb){

    b.onclick=()=>{if(b.disabled)return;if(selL)selL.classList.remove('sel');selL=b;b.classList.add('sel');};lcol.appendChild(b);});
  right.forEach(k=>{const b=el('button','opt',esc(RU1(k)));b.dataset.k=k;

      if(lk===b.dataset.k){b.disabled=true;selL.disabled=true;b.classList.add('right');selL.classList.add('right');res[lk]=res[lk]||'ok';selL=null;solved++;
        if(solved===keys.length){for(const k2 of keys)applySignal(k2,0,'match',res[k2]==='ok'?'ok_fast':'wrong',todayStr());save();

    box.appendChild(el('div',bad?'fb warn':'fb ok','Верно '+(rows.length-bad)+' из '+rows.length));
    const n=el('button','btn pri','Дальше ⏎');n.onclick=()=>doneCb({});box.appendChild(n);box._next=n;};

/* Микро-история (юнит-тест дня 2) */
function renderStory(unit,box,doneCb){
  const st=PACK.stories.find(s=>s.unit===unit);const u=PACK.units.find(x=>x.unit===unit);
  if(!st){renderUnitQuiz(unit,box,doneCb);return;}
  box.appendChild(el('h3','','Итоговый тест пачки: «'+esc(st.title)+'»'));
  box.appendChild(el('div','mut small','Заполните пропуски. В банке два лишних выражения.'));
  const keyOf=h=>Object.keys(PACK.items).find(x=>PACK.items[x].head===h||x===h);
  const bankHeads=shuffle(st.gap_items.map(gi=>IT(keyOf(gi)).head).concat(st.bank_extra));
  const parts=st.text.split(/\{\{(.*?)\}\}/g);
  const p=el('div','story card');const sels=[];
  parts.forEach((chunk,i)=>{
    if(i%2===0)p.appendChild(document.createTextNode(chunk));
    else{const sel=el('select','gapsel','<option value="">…</option>'+bankHeads.map(h=>'<option>'+esc(h)+'</option>').join(''));
      sel.dataset.right=chunk;sels.push(sel);p.appendChild(sel);}
  });
  box.appendChild(p);
  const check=el('button','btn pri','Проверить тест');box.appendChild(check);
  check.onclick=()=>{if(box.dataset.answered)return;let ok=0;
    sels.forEach((sel,idx)=>{const key=keyOf(st.gap_items[idx]);
      const good=sel.value&&(norm(sel.value)===norm(sel.dataset.right)||norm(sel.value)===norm(IT(key).head));
      sel.style.borderColor=good?'var(--ok)':'var(--bad)';
      if(good)ok++;else sel.parentNode.insertBefore(el('span','small mut',' ['+esc(sel.dataset.right)+'] '),sel.nextSibling);
      if(key){applySignal(key,0,'story',good?'ok_fast':'wrong',todayStr());
        if(ST(key).st==='learning')graduate(key,todayStr(),good);}
    });
    const score=Math.round(ok/sels.length*100);
    const a=S.meta.activeUnits.find(x=>x.unit===unit);if(a){a.testDone=true;a.score=score;}
    /* слова вне сюжета проверяются сразу после — по одному письменному заданию каждому */
    const covered=new Set(st.gap_items.map(gi=>keyOf(gi)));
    const rest=u.items.filter(k=>ST(k).st==='learning'&&!covered.has(k));
    if(SES){SES.tasks.splice(SES.i+1,0,...shuffle(rest).map(k=>({kind:'learn',k,format:'cloze_hint',stage:0})),{kind:'gradRest',unit});}
    else for(const k of rest)graduate(k,todayStr(),learnDone(k));
    save();box.dataset.answered='1';
    box.appendChild(el('div',score>=85?'fb ok':'fb warn','Результат: '+score+'%'+(score>=85?'':' — слова с ошибками вернутся завтра')));
    const n=el('button','btn pri','Дальше ⏎');n.onclick=()=>doneCb({story:true,score});box.appendChild(n);box._next=n;};
}

/* Итоговый тест пачки без сюжета: 8 предложений с общим банком */
function renderUnitQuiz(unit,box,doneCb){
  const u=PACK.units.find(x=>x.unit===unit);
  const ks=u.items.filter(k=>['learning','review','mastered'].includes(ST(k).st));
  const cand=shuffle(ks);
  const rows=[];const chosen=[];
  for(const k of cand){
    const ei=pickLongExample(k,0);const ex=exsOf(k,0)[ei];
    const g=buildGap(ex.en,IT(k).head);
    if(g){chosen.push(k);rows.push({k,g});markShown(k,0,ei);}

  }
  if(rows.length<4){finishQuiz(100);return;}
  box.appendChild(el('h3','','Итоговый тест пачки '+unit));
  const others2=Object.keys(PACK.items).filter(x=>!chosen.includes(x)&&ST(x).st!=='inbox');
  const extra=pick(others2.length>=2?others2:ks,2).map(k=>IT(k).head);
  const bank=shuffle(rows.map(r=>IT(r.k).head).concat(extra));
  box.appendChild(el('div','mut small','Заполните пропуски словами из списка. Два слова — лишние. Выбранные исчезают из вариантов; отмена — «—» или нажатие на слово в списке.'));

    r.sel=sel;list.appendChild(s);});
  wireBank(rows,tagRow2,bank);
  box.appendChild(list);
  const check=el('button','btn pri','Проверить тест');box.appendChild(check);
  function finishQuiz(score){
    const a=S.meta.activeUnits.find(x=>x.unit===unit);if(a){a.testDone=true;a.score=score;}
    for(const k of u.items)if(ST(k).st==='learning')graduate(k,todayStr(),learnDone(k));
    save();
  }
  check.onclick=()=>{if(box.dataset.answered)return;let ok=0;
    rows.forEach(r=>{const good=r.sel.value===IT(r.k).head;
      r.sel.style.borderColor=good?'var(--ok)':'var(--bad)';
      if(good)ok++;else r.sel.parentNode.appendChild(el('span','small mut',' → '+esc(IT(r.k).head)));
      applySignal(r.k,0,'story',good?'ok_fast':'wrong',todayStr());
      if(ST(r.k).st==='learning')graduate(r.k,todayStr(),good);});
    const score=Math.round(ok/rows.length*100);
    finishQuiz(score);box.dataset.answered='1';
    box.appendChild(el('div',score>=85?'fb ok':'fb warn','Результат: '+score+'%'+(score>=85?'':' — слова с ошибками вернутся в ближайшие повторения')));
    const n=el('button','btn pri','Дальше ⏎');n.onclick=()=>doneCb({story:true,score});box.appendChild(n);box._next=n;};
}

let SES=null;
/* Полный цикл дня 1 пачки: 5 этапов, без дневных ограничений */
function startUnitDay1(unitNo){
  const u=PACK.units.find(x=>x.unit===unitNo);
  let fresh=u.items.filter(k=>ST(k).st==='inbox');
  let resume=false;
  if(!fresh.length){
    const learning=u.items.filter(k=>ST(k).st==='learning');
    const a0=S.meta.activeUnits.find(x=>x.unit===unitNo);
    if(learning.length&&(!a0||!a0.day1)){fresh=learning;resume=true;}
    else{startSession();return;}
  }
  const tasks=[];
  /* Этап 1: знакомство пачками по 5 с сопоставлением */
  if(!resume)for(let i=0;i<fresh.length;i+=5){
    const batch=fresh.slice(i,i+5);
    batch.forEach((k,j)=>tasks.push({kind:'introCard',k,idx:i+j+1,total:fresh.length,stage:1}));
    tasks.push({kind:'match5',keys:batch,stage:1});
  }
  /* Этап 2: узнавание всех слов в случайном порядке */
  shuffle(fresh).forEach(k=>tasks.push({kind:'learn',k,format:'mcq_rev',stage:2}));
  /* Этап 3: первый блок предложений (общий банк) */
  tasks.push({kind:'blockA',unit:unitNo,stage:3});
  /* Этап 4: восприятие на слух */
  shuffle(fresh).forEach(k=>tasks.push({kind:'audio',k,stage:4}));
  /* Этап 5: второй блок предложений (ввод с клавиатуры) */
  tasks.push({kind:'blockBBuild',unit:unitNo,stage:5});
  tasks.push({kind:'unitDone',unit:unitNo,stage:5});
  SES={tasks,i:0,errors:[],t0:Date.now(),count:0,okc:0,unitFlow:unitNo};
  /* регистрация пачки */
  for(const k of fresh){ST(k).st='learning';ST(k).intro=ST(k).intro||todayStr();ST(k).learn=ST(k).learn||{ok:0,formats:[],prod:0,days:[]};}
  if(!S.meta.activeUnits.some(a=>a.unit===unitNo))S.meta.activeUnits.push({unit:unitNo,introDate:todayStr(),day1:false,testDone:false});
  save();showSession();
}
function startSession(){ /* повторения + конвейер закрепления */
  const tasks=buildSession(todayStr());
  if(!tasks.length){
    render('today');
    setTimeout(()=>{const t=$('#emptyMsg');if(t)t.classList.remove('hidden');},50);
    return;
  }
  SES={tasks,i:0,errors:[],t0:Date.now(),count:0,okc:0};
  showSession();
}
function showSession(){
  const app=$('#app');app.innerHTML='';
  const total=SES.tasks.length;
  const head=el('div','row');
  head.appendChild(el('div','mut small','Шаг '+Math.min(SES.i+1,total)+' из '+total+(SES.unitFlow?' · пачка '+SES.unitFlow:'')));
  const quit=el('button','btn ghost small','Прервать');quit.onclick=()=>{addMinutes();render('today');};
  head.append(el('div','spacer'),quit);app.appendChild(head);
  const pb=el('div','pbar');pb.appendChild(el('div','',''));pb.firstChild.style.width=(SES.i/total*100)+'%';app.appendChild(pb);
  if(SES.unitFlow){
    const names=['Знакомство','Узнавание','Блок 1','На слух','Блок 2'];
    const cur=(SES.tasks[Math.min(SES.i,total-1)]||{}).stage||1;
    const stp=el('div','stepper');
    names.forEach((n,i)=>{const s=el('span','step'+(i+1<cur?' done':'')+(i+1===cur?' cur':''),n);stp.appendChild(s);});
    app.appendChild(stp);
  }
  if(SES.i>=total){return sessionEnd(app);}
  const t=SES.tasks[SES.i];
  /* архивированные по ходу сессии слова пропускаются */
  if(t.k&&ST(t.k)&&ST(t.k).st==='archive'){SES.i++;showSession();return;}
  /* чекпоинт для возобновления */
  S.meta.paused={tasks:SES.tasks,i:SES.i,errors:SES.errors,count:SES.count,okc:SES.okc,unitFlow:SES.unitFlow||null,orderA:SES.orderA||null,usedA:SES.usedA||null};save();const box=el('div','card stage');app.appendChild(box);
  const done=res=>{
    if(res&&res.redo){showSession();return;}
    if(t.kind==='learn'||t.kind==='review'){
      SES.count++;if(res&&!res.wrong)SES.okc++;
      if(res&&res.wrong&&res.k){SES.errors.push({k:res.k,si:res.si||0});
        SES.tasks.push({kind:'relearn',k:res.k,si:res.si||0,format:'mcq_rev'});}}
    if(res&&res.wrong&&t.kind==='audio')SES.tasks.push({kind:'relearn',k:res.k,si:0,format:'mcq_rev'});
    SES.i++;showSession();
  };
  const kindLabel={review:'Повторение',learn:'Закрепление',relearn:'Возврат ошибки',introCard:'Новое слово',match5:'Сопоставление',blockA:'Предложения · блок 1',audio:'На слух',story:'Итоговый тест',unitDone:'Итог'};
  box.appendChild(el('div','badge',kindLabel[t.kind]||''));
  if(t.kind==='introCard')renderIntroCard(t.k,t.idx,t.total,box,done);
  else if(t.kind==='match5'){const alive=t.keys.filter(k=>ST(k).st==='learning');
    if(alive.length>=3)renderMatch(alive,box,done);else done({});}
  else if(t.kind==='blockA')renderBlockA(t.unit,box,done);
  else if(t.kind==='audio')renderAudioTask(t.k,box,done);
  else if(t.kind==='blockBBuild'){buildBlockB(t.unit);done({});}
  else if(t.kind==='gradRest'){
    const u=PACK.units.find(x=>x.unit===t.unit);const d=todayStr();
    for(const k of u.items)if(ST(k).st==='learning'){
      const h=(ST(k).hist||[]);const lastToday=h.filter(x=>x.d===d).pop();
      graduate(k,d,!!lastToday&&lastToday.r!=='wrong');}
    save();done({});}
  else if(t.kind==='story')renderStory(t.unit,box,done);
  else if(t.kind==='unitDone')renderUnitDone(t.unit,box);
  else if(t.kind==='relearn'){
    const it=IT(t.k);const c=el('div');c.appendChild(el('div','headword',esc(it.head)));
    c.appendChild(el('div','trans',esc(glossFor(t.k,t.si||0))));
    const ex=exsOf(t.k,t.si||0)[0];c.appendChild(el('div','mut small',esc(ex.en)));box.appendChild(c);
    const n=el('button','btn pri','Понятно, дальше ⏎');n.onclick=()=>done({});box.appendChild(n);box._next=n;box.dataset.answered='1';}
  else renderTask(t,box,done);
}
/* Блок 2: строится в момент прохождения — исключая предложения блока 1, порядок гарантированно другой */
function buildBlockB(unitNo){
  const u=PACK.units.find(x=>x.unit===unitNo);
  const ks=u.items.filter(k=>ST(k).st==='learning');
  let order=shuffle(ks);
  if(SES.orderA&&order.length>4){let guard=0;
    while(guard++<20&&order.slice(0,5).every((k,i)=>SES.orderA[i]===k))order=shuffle(ks);}
  const fmt=S.settings.hardFinal?'cloze':'cloze_hint';
  const at=SES.i+1;const ins=[];
  order.forEach(k=>{
    let fe=null;
    if(SES.usedA&&SES.usedA[k]!=null){
      const used=SES.usedA[k];const exs=IT(k).examples;
      let others=exs.map((e,i)=>i).filter(i=>i!==used&&(exs[i].sense||0)===0);
      const longs=others.filter(i=>wc(exs[i].en)>=8);
      if(longs.length)others=longs;
      fe=others.length?others[Math.floor(Math.random()*others.length)]:null;
    }
    ins.push({kind:'learn',k,format:fmt,forceEx:fe,stage:5});
  });
  SES.tasks.splice(at,0,...ins);
}

function errorDigest(){
  const days=Object.keys(S.days).sort().slice(-7);
  const errs=[];
  for(const k of Object.keys(S.items)){const st=ST(k);
    for(const h of (st.hist||[]).slice(-30))if(h.r==='wrong'&&days.includes(h.d))errs.push({head:IT(k).head,f:h.f,d:h.d});
    if(st.s2)for(const h of (st.s2.hist||[]).slice(-20))if(h.r==='wrong'&&days.includes(h.d))errs.push({head:IT(k).head+' (знач. 2)',f:h.f,d:h.d});
  }
  const leeches=Object.keys(S.items).filter(k=>ST(k).st==='problem'||ST(k).lapDates.length>=2).map(k=>IT(k).head);
  const confu=[];for(const k of Object.keys(S.items)){const c=ST(k).confu||{};for(const k2 in c)if(c[k2]>=2)confu.push([IT(k).head,IT(k2)?IT(k2).head:k2,c[k2]]);}
  return JSON.stringify({period:days[0]+'…'+days[days.length-1],errors:errs,problem_words:leeches,confusions:confu},null,1);
}

    c3.append(show,tr,back);app.appendChild(c3);}
  const lastB=S.meta.lastBackup;

function viewDict(app){

function wordModal(k){
  const it=IT(k),st=ST(k);
  const m=el('div','modal');const c=el('div','card');m.appendChild(c);
  c.appendChild(el('div','headword',esc(it.head)));
  const r=el('div','row');r.appendChild(soundBtn(k,null,it.head));r.appendChild(el('span','badge','Пачка '+unitOf(k).unit));c.appendChild(r);
  if(isMulti(k)){it.sense_plan.forEach((g,i)=>{const s2=i===1?st.s2:st;
    let badge='';
    if(s2&&s2.due)badge=' <span class="badge">ступень '+STEPS[s2.step]+'д, показ '+s2.due+'</span>';
    else if(i===1)badge=' <span class="badge">появится после закрепления знач. 1</span>';

  else c.appendChild(el('div','trans',esc(it.rus.join('; '))));

  const hist=(st.hist||[]);
  if(hist.length){const ok=hist.filter(h=>h.r!=='wrong').length;
    c.appendChild(el('div','small mut','История: '+ok+' верно / '+(hist.length-ok)+' ошибок'));}
  it.examples.slice(0,6).forEach((ex,i)=>{const e2=el('div','card');
    e2.appendChild(el('div','sentence small',esc(ex.en)+(isMulti(k)&&ex.sense===1?'<span class="senseTag">знач. 2</span>':'')));
    e2.appendChild(el('div','mut small',esc(ex.ru)));e2.appendChild(soundBtn(k,i,ex.en));c.appendChild(e2);});
  const acts=el('div','row');
  const mk=(t,f)=>{const b=el('button','btn small',t);b.onclick=f;acts.appendChild(b);};
  if(st.st!=='archive')mk('Знаю → архив',()=>{st.st='archive';st.archived=todayStr();save();m.remove();render('dict');});
  else mk('Вернуть из архива',()=>{st.st='review';st.step=1;st.due=todayStr();save();m.remove();render('dict');});
  mk('Сбросить прогресс',()=>{if(confirm('Сбросить слово в «не начато»?')){S.items[k]=blankItem();save();m.remove();render('dict');}});
  mk('Закрыть',()=>m.remove());
  c.appendChild(acts);m.onclick=e=>{if(e.target===m)m.remove();};
  document.body.appendChild(m);
}

function viewProg(app){
  const c=el('div','card');c.appendChild(el('h2','','Прогресс'));
  const cn=counts();const total=Object.keys(S.items).length;
  const KPI1=Math.round((cn.mastered||0)/total*100);
  /* доля верных первых ответов за 14 дней */
  const ds=Object.keys(S.days).sort().slice(-14);let fs=0,fo=0;
  ds.forEach(d=>{fs+=S.days[d].firstSeen||0;fo+=S.days[d].firstOk||0;});
  const KPI2=fs?Math.round(fo/fs*100):null;
  /* прогноз ввода по фактическому темпу последних 14 дней */
  const left=cn.inbox||0;
  let intro14=0;for(const k of Object.keys(S.items)){const st=ST(k);
    if(st.intro&&diffDays(st.intro,todayStr())<14)intro14++;
    if(!st.intro&&st.st!=='inbox'&&(st.hist||[]).length){const d0=st.hist[0].d;if(diffDays(d0,todayStr())<14)intro14++;}}
  const rate=intro14/14;
  const KPI3=left===0?'завершён':(rate>0.5?addDays(todayStr(),Math.ceil(left/rate)):'—');
  c.appendChild(el('div','row',
    '<div class="stat"><span class="n">'+KPI1+'%</span><span class="l">корпуса усвоено</span></div>'+
    '<div class="stat"><span class="n">'+(KPI2==null?'—':KPI2+'%')+'</span><span class="l">верно с первого раза (14 дн)</span></div>'+
    '<div class="stat"><span class="n">'+KPI3+'</span><span class="l">ввод закончится (прогноз)</span></div>'));
  /* воронка */
  const f=el('div');[['inbox','не начато','#9aa5b5'],['learning','в работе','#d97706'],['review','на повторении','#2563eb'],['mastered','усвоено','#16a34a'],['problem','проблемные','#dc2626'],['archive','архив','#64748b']].forEach(([k2,t,col])=>{
    const n=cn[k2]||0;const r=el('div','row small');r.innerHTML='<span style="width:130px">'+t+'</span><span class="b" style="width:40px">'+n+'</span>';
    const bar=el('div','pbar');bar.style.flex='1';bar.appendChild(el('div'));bar.firstChild.style.width=(n/total*100)+'%';bar.firstChild.style.background=col;
    r.appendChild(bar);f.appendChild(r);});
  c.appendChild(f);app.appendChild(c);
  /* карта окна забывания */
  const c2=el('div','card');c2.appendChild(el('h3','','Где забывается: ошибки по ступеням'));
  const agg={};for(const d in S.days){const b=S.days[d].byStep||{};for(const s in b){agg[s]=agg[s]||{ok:0,bad:0};agg[s].ok+=b[s].ok;agg[s].bad+=b[s].bad;}}
  const tbl=el('table','t','<tr><th>Ступень</th><th>Ответов</th><th>Ошибок</th><th>Доля ошибок</th></tr>');
  STEPS.forEach((days2,i)=>{const a=agg['s'+i]||{ok:0,bad:0};const tot=a.ok+a.bad;
    tbl.innerHTML+='<tr><td>'+days2+' дн.</td><td>'+tot+'</td><td>'+a.bad+'</td><td>'+(tot?Math.round(a.bad/tot*100)+'%':'—')+'</td></tr>';});
  c2.appendChild(tbl);c2.appendChild(el('div','small mut','Высокий процент на конкретной ступени — сигнал сжать этот интервал (обсудим на разборе).'));
  app.appendChild(c2);
  /* активность */
  const c3=el('div','card');c3.appendChild(el('h3','','Активность (последние 10 недель)'));
  const heat=el('div','heat');const start=addDays(todayStr(),-69);
  for(let i=0;i<70;i++){const d=addDays(start,i);const n=(S.days[d]||{}).done||0;
    const cls=n===0?'':n<20?'a1':n<60?'a2':'a3';const s=el('i',cls);s.title=d+': '+n;heat.appendChild(s);}
  c3.appendChild(heat);app.appendChild(c3);
  /* проблемные */
  const probs=Object.keys(S.items).filter(k=>ST(k).st==='problem'||ST(k).lapses>=2)
    .sort((a,b)=>ST(b).lapses-ST(a).lapses).slice(0,20);
  if(probs.length){const c4=el('div','card');c4.appendChild(el('h3','','Проблемные слова'));
    probs.forEach(k=>{const r=el('div','dictrow');r.innerHTML='<b>'+esc(IT(k).head)+'</b><span class="mut small">'+esc(RU1(k))+'</span><span class="spacer"></span><span class="badge">'+ST(k).lapses+' срывов</span>';
      r.onclick=()=>wordModal(k);c4.appendChild(r);});
    app.appendChild(c4);}
}

  a.download='vocab_progress_'+todayStr()+'.json';a.click();
  S.meta.lastBackup=todayStr();save();setTimeout(()=>render(),300);
}
function viewData(app){
  const c=el('div','card');c.appendChild(el('h2','','Данные и настройки'));
  /* строгость и звук */
  c.appendChild(el('h3','','Проверка и звук'));
  const opts=[['strictTyping','Строгая проверка ввода (без допуска опечатки)'],['autoIntroSound','Автопроизношение на карточке знакомства'],['hardFinal','Усложнённый финальный блок: без подсказки-маски']];
  opts.forEach(([key,t])=>{const r=el('label','row small');const cb=el('input');cb.type='checkbox';cb.checked=!!S.settings[key];
    cb.onchange=()=>{S.settings[key]=cb.checked;save();};r.append(cb,document.createTextNode(' '+t));c.appendChild(r);});
  /* голос */
  const vr=el('div','row small');vr.appendChild(el('span','','Голос браузера: '));
  const sel=el('select','gapsel');sel.innerHTML='<option value="">авто (en-GB)</option>'+VOICES.map(v=>'<option'+(S.settings.voiceName===v.name?' selected':'')+'>'+esc(v.name)+'</option>').join('');
  sel.onchange=()=>{S.settings.voiceName=sel.value;save();};vr.appendChild(sel);
  const test=el('button','btn small','Тест');test.onclick=()=>speak('Negotiations stalled because neither side would give ground.');vr.appendChild(test);
  c.appendChild(vr);
  c.appendChild(el('div','small mut','При наличии рядом с тренажёром папки audio с записями произношения используются они; иначе — синтез речи браузера.'));
  app.appendChild(c);
  /* данные */
  const c2=el('div','card');c2.appendChild(el('h3','','Прогресс'));
  const r2=el('div','row');
  const addP=el('button','btn','Добавить пачки из файла');
  const fp=el('input');fp.type='file';fp.accept='.json';fp.style.display='none';
  fp.onchange=()=>{const f=fp.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{
      const j=JSON.parse(rd.result);
      if(!j.items||!j.units)throw 0;
      S.addon=S.addon||{units:[],items:{},stories:[]};
      const existing=new Set(Object.keys(PACK.items).map(x=>x.toLowerCase()));
      let maxU=Math.max(...PACK.units.map(u=>u.unit),...(S.addon.units.map(u=>u.unit)));
      let added=0,skipped=0;
      for(const u of j.units){
        const keep=u.items.filter(k=>!existing.has(k.toLowerCase()));
        skipped+=u.items.length-keep.length;
        if(!keep.length)continue;
        maxU++;const nu={unit:maxU,title:u.title,items:keep};
        S.addon.units.push(nu);
        for(const k of keep){const it=j.items[k];it.unit=maxU;S.addon.items[k]=it;existing.add(k.toLowerCase());added++;}
        const st=(j.stories||[]).find(s=>s.unit===u.unit);
        if(st){st.unit=maxU;S.addon.stories.push(st);}
      }
      save();alert('Добавлено слов: '+added+(skipped?', пропущено дублей: '+skipped:'')+'. Пачки появятся после обновления страницы.');location.reload();
    }catch(e){alert('Не удалось прочитать файл пачек');}};
    rd.readAsText(f);};
  addP.onclick=()=>fp.click();
  r2.append(addP,fp);
  const ex=el('button','btn','Экспорт прогресса');ex.onclick=exportProgress;
  const im=el('button','btn','Импорт прогресса');
  const fi=el('input');fi.type='file';fi.accept='.json';fi.style.display='none';
  fi.onchange=()=>{const f=fi.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const j=JSON.parse(rd.result);if(!j.items)throw 0;
      if(!confirm('Текущий прогресс будет заменён импортированным. Перед заменой автоматически скачается резервная копия текущего. Продолжить?'))return;
      exportProgress();
      setTimeout(()=>{S=j;save();alert('Импортировано');location.reload();},400);
    }catch(e){alert('Не удалось прочитать файл');}};
    rd.readAsText(f);};
  im.onclick=()=>fi.click();
  const mg=el('button','btn','Объединить с файлом');
  const fm=el('input');fm.type='file';fm.accept='.json';fm.style.display='none';
  fm.onchange=()=>{const f=fm.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{
      const j=JSON.parse(rd.result);if(!j.items)throw 0;
      let taken=0,kept=0;
      /* добавочные пачки из файла */
      if(j.addon&&j.addon.units){S.addon=S.addon||{units:[],items:{},stories:[]};
        const have=new Set((S.addon.units||[]).map(u=>u.unit).concat(PACK.units.map(u=>u.unit)));
        for(const u of j.addon.units)if(!have.has(u.unit)){S.addon.units.push(u);Object.assign(S.addon.items,j.addon.items||{});}}
      /* по каждому слову выигрывает более продвинутая версия (длиннее история) */
      for(const k in j.items){
        const a=S.items[k],b=j.items[k];
        if(!a){S.items[k]=b;taken++;continue;}
        const la=(a.hist||[]).length+((a.s2&&a.s2.hist)||[]).length;
        const lb=(b.hist||[]).length+((b.s2&&b.s2.hist)||[]).length;
        if(lb>la){S.items[k]=b;taken++;}else kept++;
      }
      /* дневная статистика: объединение по датам */
      for(const d in (j.days||{})){
        if(!S.days[d])S.days[d]=j.days[d];
        else for(const f2 of ['done','ok','firstSeen','firstOk','min'])S.days[d][f2]=Math.max(S.days[d][f2]||0,j.days[d][f2]||0);
      }
      save();alert('Слияние выполнено. Обновлено слов: '+taken+', сохранено локальных: '+kept+'.');location.reload();
    }catch(e){alert('Не удалось прочитать файл');}};
    rd.readAsText(f);};
  mg.onclick=()=>fm.click();
  r2.append(mg,fm);
  const wipe=el('button','btn ghost','Сбросить всё');
  wipe.onclick=()=>{if(confirm('Удалить весь прогресс?')&&confirm('Точно? Это необратимо без бэкапа.')){localStorage.removeItem(LSKEY);location.reload();}};
  r2.append(ex,im,wipe,fi);c2.appendChild(r2);
  c2.appendChild(el('div','small mut','«Импорт прогресса» — полная замена (с автоматической резервной копией). «Объединить с файлом» — безопасный перенос между компьютером и телефоном: по каждому слову остаётся более продвинутая версия, ничего не затирается.'));
  app.appendChild(c2);
  const c3=el('div','card');c3.appendChild(el('h3','','О системе'));
  c3.appendChild(el('div','small mut','Пак: '+PACK.pack_id+' · единиц: '+Object.keys(PACK.items).length+' · юнитов: '+PACK.units.length+' · схема прогресса v1.<br>Горячие клавиши: <kbd>1–6</kbd> — выбор варианта, <kbd>Enter</kbd> — далее.'));
  app.appendChild(c3);
}

function onboarding(){
  const steps=[
    ['Как устроено обучение','Материал разбит на пачки по 20 слов. Новая пачка проходится за одну сессию из пяти этапов: знакомство, узнавание, предложения с пропусками, восприятие на слух и письменный блок. Затем слова закрепляются повторениями по расписанию.'],
    ['Отвечайте честно','Кнопка «Не уверен» — полезный сигнал: слово вернётся раньше. Ошибки — часть процесса: такое слово будет появляться чаще. Слово считается выученным только после серии успешных ответов в разных форматах.'],
    ['Повторения по расписанию','Интервалы между показами растут: 1 → 3 → 7 → 14 → 30 → 60 → 120 дней. На длинные интервалы слово переходит только после письменных ответов. Кнопка «Уже знаю» отправляет слово в архив, не занимая ваше время.']];
  let i=0;const m=el('div','modal');const c=el('div','card');m.appendChild(c);
  function draw(){c.innerHTML='';const [t,txt]=steps[i];
    c.appendChild(el('h2','',t));c.appendChild(el('div','',txt));
    const r=el('div','row');
    const n=el('button','btn pri',i<steps.length-1?'Дальше':'Начать');
    n.onclick=()=>{i++;if(i>=steps.length){S.meta.firstRun=false;save();m.remove();}else draw();};
    r.appendChild(n);c.appendChild(r);}
  draw();document.body.appendChild(m);
}
