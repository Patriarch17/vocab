<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="mobile-web-app-capable" content="yes">

<title>Vocab Trainer</title>
<style>
:root{
  --bg:#0b0f1a; --card:#131a2b; --card2:#0f1524; --ink:#e8edf7; --mut:#8fa0b8; --line:#243049;
  --acc:#4f7cff; --acc2:#7c5cff; --acc-ink:#ffffff;
  --grad:linear-gradient(135deg,#4f7cff 0%,#7c5cff 100%);
  --ok:#34d399; --bad:#f87171; --warn:#fbbf24;
  --soft:#1a2338; --shadow:0 10px 30px -12px rgba(0,0,0,.55);
  --r:16px;
}
:root[data-theme=light]{
  --bg:#f2f5fa; --card:#ffffff; --card2:#f8fafd; --ink:#182036; --mut:#67748c; --line:#e2e8f2;
  --soft:#edf1f8; --shadow:0 10px 25px -14px rgba(23,37,84,.18);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:16px/1.55 'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;min-height:100vh;position:relative;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(55% 38% at 18% -5%, rgba(79,124,255,.16), transparent 70%),
             radial-gradient(45% 32% at 88% 0%, rgba(124,92,255,.13), transparent 70%),
             radial-gradient(40% 30% at 50% 110%, rgba(52,211,153,.05), transparent 70%);}
:root[data-theme=light] body::before{background:radial-gradient(55% 38% at 18% -5%, rgba(79,124,255,.10), transparent 70%),radial-gradient(45% 32% at 88% 0%, rgba(124,92,255,.08), transparent 70%);}
.wrap{max-width:1060px;margin:0 auto;padding:18px 20px 96px;position:relative;z-index:1;}
.wrap.session{max-width:820px;}
.topbar{display:flex;gap:6px;align-items:center;padding:6px 0 18px;flex-wrap:wrap}
.tab{border:0;background:transparent;color:var(--mut);font:600 15px/1 inherit;padding:10px 16px;border-radius:12px;cursor:pointer;transition:.18s}
.tab:hover{color:var(--ink);background:var(--soft)}
.tab.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow);border:1px solid var(--line)}
.spacer{flex:1}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-bottom:16px;border:1px solid var(--line);animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
h1{font-size:26px;margin:0 0 8px;font-weight:800;letter-spacing:-.3px}
h2{font-size:19px;margin:0 0 12px;font-weight:700}
h3{font-size:16px;margin:0 0 10px;font-weight:700}
.hero-title{font-size:30px;font-weight:800;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 4px}
.mut{color:var(--mut)} .small{font-size:13px} .b{font-weight:700}
.btn{border:0;border-radius:13px;padding:12px 20px;font:600 15px/1 inherit;cursor:pointer;background:var(--soft);color:var(--ink);border:1px solid var(--line);transition:.16s}
.btn:hover{transform:translateY(-1px);border-color:var(--acc)}
.btn.pri{background:var(--grad);color:#fff;border:0;box-shadow:0 8px 20px -8px rgba(79,124,255,.55)}
.btn.pri:hover{filter:brightness(1.08)}
.btn.big{font-size:16.5px;padding:15px 28px;border-radius:14px}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.45;cursor:default;transform:none}
.btn.ok{background:var(--ok);color:#06281a;border:0}.btn.bad{background:var(--bad);color:#2b0808;border:0}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
.statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:14px 0 4px}
.stat{position:relative;display:flex;flex-direction:column;gap:3px;padding:16px 18px;background:var(--card2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad);opacity:.9}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-.5px}
.stat .l{font-size:12.5px;color:var(--mut)}
.pbar{height:7px;background:var(--soft);border-radius:5px;overflow:hidden;margin:8px 0}
.pbar>div{height:100%;background:var(--grad);transition:width .3s;border-radius:5px}
.opt{display:block;width:100%;text-align:left;margin:8px 0;padding:14px 16px;border-radius:13px;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);font:500 15.5px/1.45 inherit;cursor:pointer;transition:.15s}
.opt:hover{border-color:var(--acc);box-shadow:0 0 0 3px rgba(79,124,255,.14);transform:translateX(2px)}
.opt.sel{border-color:var(--acc);background:var(--soft)}
.opt.right{border-color:var(--ok);background:rgba(52,211,153,.10);animation:pulseOk .35s ease}
.opt.wrong{border-color:var(--bad);background:rgba(248,113,113,.10)}
@keyframes pulseOk{0%{transform:scale(1)}45%{transform:scale(1.015)}100%{transform:scale(1)}}
.opt .k{display:inline-block;min-width:22px;color:var(--mut);font-weight:700}
.headword{font-size:40px;font-weight:800;letter-spacing:-.4px;margin:2px 0}
.trans{color:var(--mut);font-size:16.5px}
.sentence{font-size:19px;line-height:1.75;margin:12px 0}
.gap{display:inline-block;min-width:90px;border-bottom:2px solid var(--acc);text-align:center;padding:0 6px;font-weight:700}
.inp{width:100%;padding:14px 16px;font:600 18px/1.3 inherit;border-radius:13px;border:1.5px solid var(--line);background:var(--card2);color:var(--ink)}
.inp:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(79,124,255,.16)}
.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.tag{padding:9px 14px;border-radius:11px;background:var(--card2);border:1.5px solid var(--line);cursor:pointer;font:600 14px/1 inherit;color:var(--ink);transition:.14s}
.tag:hover{border-color:var(--acc)}
.tag.used{opacity:.38;text-decoration:line-through}
.sound{border:1px solid var(--line);background:var(--card2);border-radius:11px;padding:8px 13px;cursor:pointer;font-size:15px;color:var(--ink);transition:.15s}
.sound:hover{border-color:var(--acc)}
.fb{margin-top:14px;padding:14px 16px;border-radius:13px;font-weight:600;animation:fadeUp .22s ease}
.fb.ok{background:rgba(52,211,153,.12);color:var(--ok);border:1px solid rgba(52,211,153,.35)}
.fb.bad{background:rgba(248,113,113,.10);color:var(--bad);border:1px solid rgba(248,113,113,.35)}
.fb.warn{background:rgba(251,191,36,.10);color:var(--warn);border:1px solid rgba(251,191,36,.35)}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dictrow{display:flex;gap:10px;align-items:center;padding:11px 6px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
.dictrow:hover{background:var(--soft)}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.badge{font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:8px;background:var(--soft);color:var(--mut);white-space:nowrap;border:1px solid var(--line)}
.heat{display:flex;gap:3px;flex-wrap:wrap}
.heat i{width:13px;height:13px;border-radius:3.5px;background:var(--soft);display:block}
.heat i.a1{background:rgba(79,124,255,.35)}
.heat i.a2{background:rgba(79,124,255,.65)}
.heat i.a3{background:var(--acc)}
.modal{position:fixed;inset:0;background:rgba(5,8,16,.72);display:flex;align-items:center;justify-content:center;z-index:20;padding:16px}
.modal>.card{max-width:600px;width:100%;max-height:86vh;overflow:auto}
table.t{width:100%;border-collapse:collapse;font-size:14px}
table.t td,table.t th{padding:8px 9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
.senseTag{font-size:12px;font-weight:700;color:var(--acc);background:rgba(79,124,255,.14);border-radius:7px;padding:2px 8px;margin-left:6px}
kbd{background:var(--soft);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:12px}
.story{font-size:17.5px;line-height:2.0}
select.gapsel{font:600 15px/1.2 inherit;padding:6px 10px;border-radius:10px;border:1.5px solid var(--acc);background:var(--card2);color:var(--ink)}
.packgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-top:12px}
.pack{position:relative;border:1px solid var(--line);border-radius:15px;padding:16px;display:flex;flex-direction:column;gap:7px;background:var(--card2);transition:.18s}
.pack:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 14px 30px -14px rgba(79,124,255,.35)}
.pack .num{position:absolute;right:12px;top:8px;font-size:34px;font-weight:800;color:var(--line);letter-spacing:-1px;user-select:none}
.pack.new{border-style:dashed}
.pack.srs{opacity:.9}
.pack.test{border-color:var(--warn)}
.pack.resume{border-color:var(--acc)}
.stage{min-height:calc(100dvh - 235px);display:flex;flex-direction:column}
.stage.center{justify-content:center}
.stage .actions{margin-top:auto;padding-top:16px}
.stepper{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;gap:5px;justify-content:center;padding:10px 10px calc(10px + env(safe-area-inset-bottom));z-index:5;flex-wrap:wrap}
.stepper .step{font-size:12.5px;font-weight:600;color:var(--mut);padding:7px 13px;border-radius:10px;background:var(--soft);cursor:pointer;user-select:none;border:1px solid transparent;transition:.15s}
.stepper .step:hover{color:var(--ink);border-color:var(--acc)}
.stepper .step.cur{background:var(--grad);color:#fff}
.stepper .step.done{color:var(--ink);background:color-mix(in srgb,var(--acc) 22%,var(--soft))}
.actionCol{display:flex;flex-direction:column;gap:10px;margin-top:18px;max-width:480px}
.actionCol .btn{width:100%}
.ru-reveal{font-size:14px;color:var(--mut);margin:2px 0 10px;padding-left:2px;border-left:2px solid var(--line);padding-left:10px}
@media(max-width:520px){
  .wrap{padding:10px 12px 100px}
  .headword{font-size:28px}
  .sentence{font-size:17px}
  .card{padding:16px;border-radius:14px}
  .btn.big{width:100%;font-size:16px}
  .stat .n{font-size:21px}
  .topbar .tab{padding:8px 11px;font-size:14px}
  .packgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
  .opt{padding:12px 12px;font-size:15px}
  .stepper .step{font-size:11px;padding:5px 9px}
  .pair{gap:6px}
  .pair .opt{font-size:13.5px;padding:10px 8px}
  .hero-title{font-size:24px}
}
.stage{align-items:stretch}
.stage .badge{align-self:flex-start;margin-bottom:4px}
.qbody{flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px;padding:8px 0}
.qbody .headword{font-size:44px}
.qbody .opt{padding:16px 18px;font-size:16.5px}
.soundBig{width:84px;height:84px;border-radius:50%;border:0;background:var(--grad);color:#fff;font-size:30px;cursor:pointer;box-shadow:0 10px 26px -8px rgba(79,124,255,.6);transition:.16s;align-self:center}
.soundBig:hover{transform:scale(1.05)}
.soundHint{align-self:center;color:var(--mut);font-size:13px;margin-top:8px}
.exRow{display:flex;gap:14px;align-items:center;justify-content:space-between}
.exRow .extext{flex:1}
.pack .desc{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:38px}
.pack .btn{margin-top:auto}
.assocBox{margin:10px 0;padding:12px 14px;border:1px dashed var(--line);border-radius:12px;background:rgba(79,124,255,.05)}
.assocTitle{font-size:12px;font-weight:700;color:var(--acc);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.assocLine{font-size:14px;color:var(--mut);line-height:1.55}
.hidden{display:none!important}
a{color:var(--acc)}
</style>
</head>

const STOPW=new Set(['a','an','the','to','of','your','someone','somebody','sth','be','my','us','it','that','s','me','oneself','something','anything',"one's","someone's",'yourself','sb']);
const headToks=h=>norm(h.replace(/\(.*?\)/g,'').replace(/\//g,' ')).split(/[^a-z'\-\*]+/).filter(t=>t&&!STOPW.has(t));
function wordMatch(tok,w){w=w.replace(/-/g,'');tok=tok.replace(/-/g,'');
  if(tok.length<=3){
    if(w===tok||(IRREG[tok]||[]).includes(w))return true;
    if(w.startsWith(tok)&&['s','es','ed','ing'].includes(w.slice(tok.length)))return true; /* pays, vows */
    if(w===tok+tok.slice(-1)+'ing'||w===tok+tok.slice(-1)+'ed')return true; /* hogging, summed */
    return false;
  }
  const stem=tok.slice(0,Math.max(4,tok.length-2));
  if(w.startsWith(stem)&&Math.abs(w.length-tok.length)<=5)return true;
  if(tok.endsWith('e')&&(w===tok.slice(0,-1)+'ing'||w===tok.slice(0,-1)+'ed'))return true; /* coming, making */
  return (IRREG[tok]||[]).includes(w);}

function buildGap(sent,head){
  const words=sent.split(/(\s+)/);const toks=headToks(head);if(!toks.length)return null;
  const idx=[];words.forEach((w,i)=>{const lw=norm(w).replace(/[^a-z'\-]/g,'');if(!lw)return;
    const hit=toks.some(t=>wordMatch(t,lw)||(lw.includes('-')&&lw.split('-').some(p=>p&&wordMatch(t,p))));
    if(hit)idx.push(i);});
  if(!idx.length)return null;
  let lo=idx[0],hi=idx[idx.length-1];
  const spanWords=Math.ceil((hi-lo+1)/2);
  if(spanWords>toks.length+2){ // разрыв: закрываем самый длинный токен
    const longest=toks.slice().sort((a,b)=>b.length-a.length)[0];
    const i=words.findIndex(w=>{const lw=norm(w).replace(/[^a-z'\-]/g,'');return wordMatch(longest,lw)||(lw.includes('-')&&lw.split('-').some(p=>p&&wordMatch(longest,p)));});
    if(i<0)return null;lo=hi=i;
  }
  const ans=words.slice(lo,hi+1).join('');
  const tail=ans.match(/[.,!?;:”")]+$/);const clean=tail?ans.slice(0,-tail[0].length):ans;
  return {pre:words.slice(0,lo).join(''),ans:clean,post:(tail?tail[0]:'')+words.slice(hi+1).join('')};
}

/* ============ ЯДРО ПЛАНИРОВЩИКА ============ */ /*CORE-BEGIN*/
const PRODF=new Set(['cloze','ru_en','cloze_hint']);
const CERTF=new Set(['cloze','ru_en']); /* сертификация длинных интервалов: только ввод без маски */
const RECOGF=new Set(['mcq_ctx','mcq_rev','match','sense_pick','duel','bank']);
function fuzz(days){const f=Math.max(0,Math.round(days*0.15));return days+Math.floor(Math.random()*(2*f+1))-f;}
/* сигнал: 'ok_fast'|'ok'|'ok_slow'|'unsure'|'hint'|'wrong' */
function applySignal(k,si,format,signal,dateISO){
  const st=senseState(k,si);const it=ST(k);const d=dateISO;
  st.hist=st.hist||[];st.hist.push({d,f:format,r:signal});if(st.hist.length>80)st.hist.shift();
  const stepRec=day(d).byStep;const sk='s'+(st.step||0);stepRec[sk]=stepRec[sk]||{ok:0,bad:0};
  if(signal==='wrong')stepRec[sk].bad++;else stepRec[sk].ok++;
  if(st.st==='learning'&&si===0){ /* юнитная фаза */
    const L=it.learn;
    if(signal!=='wrong'){L.ok++;if(!L.formats.includes(format))L.formats.push(format);
      if(PRODF.has(format))L.prod++;if(!L.days.includes(d))L.days.push(d);}
    return;
  }
  if(st.st!=='review'&&st.st!=='mastered'&&st.st!=='problem')return;
  const late=st.due?Math.max(0,diffDays(st.due,d)):0;
  if(signal==='wrong'){
    st.step=Math.max(0,st.step-2);st.lapses++;
    if(st.lapDates[st.lapDates.length-1]!==d)st.lapDates.push(d); /* разные даты, а не события */
    st.lapDates=st.lapDates.filter(x=>diffDays(x,d)<=60);
    if(st.st==='mastered')st.st='review';
    if(st.lapDates.length>=3&&si===0&&(it.st==='review'||it.st==='mastered')){it.st='problem';it.probOk=0;it.everProblem=true;}
    st.due=addDays(d,Math.max(1,fuzz(STEPS[st.step])));
    return;
  }
  if(signal==='unsure'||signal==='hint'||signal==='ok_slow'){
    st.due=addDays(d,Math.max(1,Math.round(STEPS[st.step]/2)));return;
  }
  /* верный уверенный: рост. Выше step 2 — только письменный ввод; выше step 4 — без маски */
  const wantStep=st.step+1;
  if(st.step>=2&&!PRODF.has(format)&&format!=='story'){
    st.due=addDays(d,Math.max(1,Math.round(STEPS[st.step]/2)));return;
  }
  if(st.step>=4&&!CERTF.has(format)){
    st.due=addDays(d,Math.max(1,Math.round(STEPS[st.step]/2)));return;
  }
  /* повторный успех в день ошибки не двигает интервал */
  if((st.hist||[]).some(h=>h.d===d&&h.r==='wrong'&&h!==st.hist[st.hist.length-1])){
    st.due=addDays(d,1);return;
  }
  /* кредит за фактическую выдержку при просрочке */
  const heldDays=STEPS[st.step]+Math.max(0,late); /* сколько интервал реально выдержан */
  let base=STEPS[Math.min(wantStep,STEPS.length-1)];
  if(late>STEPS[st.step]){let bi=wantStep;
    while(bi<STEPS.length-1&&STEPS[bi]<heldDays)bi++;base=STEPS[bi];st.step=bi;}
  else{
    /* серия из двух быстрых письменных — скачок, но не через 60-дневный рубеж */
    const h=st.hist;const prev=h.length>=2?h[h.length-2]:null;
    if(signal==='ok_fast'&&prev&&prev.r==='ok_fast'&&wantStep+1<=4&&PRODF.has(format)){st.step=wantStep+1;base=STEPS[st.step];}
    else{st.step=Math.min(wantStep,STEPS.length-1);base=STEPS[st.step];}
  }
  st.due=addDays(d,Math.max(1,fuzz(base)));
  /* усвоено = выдержан интервал не короче 60 дней и подтверждён вводом без маски */
  if(si===0&&heldDays>=60&&st.step>MASTER_STEP&&CERTF.has(format)&&it.st==='review')it.st='mastered';
  /* активация второго значения: первое закрепилось (14 дн) и есть примеры второго */
  if(si===0&&isMulti(k)&&!it.s2&&st.step>=3&&IT(k).examples.some(e=>e.sense===1)){
    const s2=senseState(k,1);s2.st='review';s2.step=0;s2.due=addDays(d,1);}
  if(si===0&&it.st==='problem'){it.probOk=(it.probOk||0)+1;if(it.probOk>=2){it.st='review';it.probOk=0;it.lapDates=[];}}
}
function learnDone(k){const L=ST(k).learn;return L.ok>=4&&L.formats.length>=3;}
function graduate(k,dateISO,cleanTest){const st=ST(k);st.st='review';st.step=cleanTest?1:0;st.due=addDays(dateISO,STEPS[st.step]);}
function formatForStep(k,si,step){
  const multi=isMulti(k)&&si===0&&ST(k).s2;
  const t=IT(k).type;
  const pools={
    low:['mcq_rev'].concat(t==='idiom'||t==='pattern'?['assembly']:[]),
    mid:['cloze_hint','mcq_rev','cloze_hint'],
    high:['cloze','ru_en','cloze']
  };
  let pool=step<=1?pools.low:step===2?pools.mid:pools.high;
  if(multi&&Math.random()<0.2&&IT(k).examples.some(e=>e.sense===1)&&IT(k).examples.some(e=>(e.sense||0)===0))pool=['sense_pick'];
  if(t==='pattern')pool=step<=1?['mcq_rev']:['cloze_hint','cloze'];
  return pool[Math.floor(Math.random()*pool.length)];
}
function pickExample(k,si){
  const st=senseState(k,si);const exs=exsOf(k,si);if(exs.length===1)return 0;
  const hoAbs=IT(k).holdout; /* экзаменационный пример скрыт из обычной ротации */
  const hoRel=hoAbs!=null?exs.indexOf(IT(k).examples[hoAbs]):-1;
  let counts=exs.map((e,i)=>({i,c:(ST(k).shown&&ST(k).shown[si+'_'+i])||0}));
  if(hoRel>=0&&counts.length>2)counts=counts.filter(x=>x.i!==hoRel);
  const cand=counts.filter(x=>x.i!==st.lastEx);cand.sort((a,b)=>a.c-b.c);
  const best=cand.slice(0,Math.max(1,Math.min(3,cand.length)));
  return best[Math.floor(Math.random()*best.length)].i;
}
function markShown(k,si,i){const st=ST(k);st.shown=st.shown||{};st.shown[si+'_'+i]=(st.shown[si+'_'+i]||0)+1;senseState(k,si).lastEx=i;}
/* ---- конвейер и сборка сессии ---- */
function unitOf(k){return PACK.units.find(u=>u.items.includes(k));}
function activeUnitInfos(){return S.meta.activeUnits.map(a=>({...a,unit:PACK.units.find(u=>u.unit===a.unit)}));}
function unitFinished(a){const u=(a.unit&&a.unit.items)?a.unit:PACK.units.find(x=>x.unit===a.unit);return u.items.every(k=>['review','mastered','problem','archive','suspended'].includes(ST(k).st));}
function dueReviews(dateISO){
  const out=[];
  for(const k of Object.keys(S.items)){const it=ST(k);
    if(['review','mastered','problem'].includes(it.st)&&it.due&&it.due<=dateISO)out.push({k,si:0,late:diffDays(it.due,dateISO),step:it.step,prob:it.st==='problem'});
    if(it.s2&&it.s2.due&&it.s2.due<=dateISO&&['review','mastered'].includes(it.st))out.push({k,si:1,late:diffDays(it.s2.due,dateISO),step:it.s2.step,prob:false});
  }
  out.sort((a,b)=>(b.prob-a.prob)||((b.late/STEPS[b.step])-(a.late/STEPS[a.step]))||(a.step-b.step));
  return out;
}
function buildSession(dateISO){
  const tasks=[];const cap=S.settings.reviewCap;
  /* 1. повторения по расписанию */
  const due=dueReviews(dateISO).slice(0,cap);
  for(const d of due)tasks.push({kind:'review',k:d.k,si:d.si,format:formatForStep(d.k,d.si,d.step)});
  /* 2. конвейер закрепления пачек (после дня 1) */
  for(const a of activeUnitInfos()){
    if(unitFinished(a)||!a.day1)continue;
    const age=diffDays(a.introDate,dateISO);
    const ks=a.unit.items.filter(k=>ST(k).st==='learning');
    if(!a.testDone&&age>=1){
      for(const k of pick(ks.filter(k=>!learnDone(k)),6))tasks.push({kind:'learn',k,format:'cloze_hint'});
      duelTasks(tasks,a.unit,3);

}
function duelTasks(tasks,unit,n){

    for(const ch of (it.confusables||[])){
      const k2=Object.keys(PACK.items).find(x=>PACK.items[x].head===ch);

      if(['review','mastered'].includes(s2.st)&&s2.step>=1&&c<n){tasks.push({kind:'review',k,si:0,format:'duel',duelWith:k2});c++;}

function typedVerdict(k,si,input,target){
  const inp=norm(input).replace(/[.,!?;:]+$/,'');if(!inp)return {v:'empty'};
  const tol=s=>s.length<=12?1:2;
  const cands=[norm(target),norm(IT(k).head.replace(/\(.*?\)/g,'').replace(/\//g,' '))];
  for(const t of headToks(IT(k).head))for(const ir of (IRREG[t]||[]))cands.push(norm(target).replace(t,ir));
  for(const c of cands){if(inp===c)return {v:'ok'};if(!S.settings.strictTyping&&lev(inp,c)<=tol(c))return {v:'typo',fix:target};}
  for(const a of (IT(k).accept||[])){const na=norm(a);if(inp===na||(!S.settings.strictTyping&&lev(inp,na)<=1))return {v:'alt',want:target,got:a};}
  return {v:'wrong'};
}

function introducedHead(h){const key=Object.keys(PACK.items).find(x=>PACK.items[x].head===h);return !key||ST(key).st!=='inbox';}
function renderTask(t,box,doneCb){

  function mcq(options,rightIdx,prompt,sub){

/* Банк с исчезающими словами и отменой выбора */
function wireBank(rows, tagRow, bank){
  const tagMap={};
  tagRow.innerHTML='';
  bank.forEach(h=>{const t=el('span','tag',esc(h));tagMap[h]=t;tagRow.appendChild(t);});
  function usedMap(){const u={};rows.forEach(r=>{if(r.sel.value)u[r.sel.value]=1;});return u;}
  function rebuild(){
    const u=usedMap();
    rows.forEach(r=>{
      const cur=r.sel.value;
      let html='<option value="">—</option>';
      bank.forEach(h=>{if(h===cur||!u[h])html+='<option'+(h===cur?' selected':'')+'>'+esc(h)+'</option>';});
      r.sel.innerHTML=html;r.sel.value=cur;
    });
    bank.forEach(h=>{tagMap[h].classList.toggle('used',!!u[h]);});
  }
  rows.forEach(r=>r.sel.addEventListener('change',rebuild));
  bank.forEach(h=>{tagMap[h].onclick=()=>{const r=rows.find(x=>x.sel.value===h);if(r){r.sel.value='';rebuild();}};});
  rebuild();
}

function pickLongExample(k,si){

  let cand=exs.map((e,i)=>({i,c:(st.shown&&st.shown[si+'_'+i])||0,len:wc(e.en)}));
  if(hoRel>=0&&cand.length>2)cand=cand.filter(x=>x.i!==hoRel);

/* Блок предложений: все слова юнита, банк-выбор (A) */
function renderBlockA(unit,box,doneCb,phase){
  phase=phase||1;
  const u=PACK.units.find(x=>x.unit===unit);
  let ks=shuffle(u.items.filter(k=>ST(k).st==='learning'));
  if(phase===2&&SES&&SES.orderA&&ks.length>4){let g2=0;
    while(g2++<20&&ks.slice(0,5).every((k,i)=>SES.orderA[i]===k))ks=shuffle(ks);}
  box.appendChild(el('h3','','Блок '+phase+': подставьте слова в предложения'));
  box.appendChild(el('div','mut small',(phase===2?'Те же слова — новые предложения и другой порядок. ':'')+'Все '+ks.length+' слов пачки в перемешанном порядке.'));
  const others=Object.keys(PACK.items).filter(x=>!ks.includes(x)&&ST(x).st!=='inbox');
  const extras=pick(others.length>=4?others:Object.keys(PACK.items).filter(x=>!ks.includes(x)),4).map(x=>IT(x).head);
  const bank=shuffle(ks.map(k=>IT(k).head).concat(extras));
  box.appendChild(el('div','mut small','Четыре слова в списке — лишние. Выбранные слова исчезают из вариантов; чтобы отменить ответ, выберите «—» или нажмите на использованное слово в списке.'));
  const tagRow=el('div','tagrow');box.appendChild(tagRow);
  const rows=[];const list=el('div');
  const used={};
  ks.forEach(k=>{
    let ei;
    if(phase===2&&SES&&SES.usedA&&SES.usedA[k]!=null){
      const exs2=exsOf(k,0);const usedAbs=SES.usedA[k];
      let cand=exs2.map((e,i)=>({i,abs:IT(k).examples.indexOf(e),len:wc(e.en)})).filter(c=>c.abs!==usedAbs);
      if(!cand.length)cand=exs2.map((e,i)=>({i,len:wc(e.en)}));
      const l10=cand.filter(c=>c.len>=10);const l8=cand.filter(c=>c.len>=8);
      const fin=(l10.length?l10:(l8.length?l8:cand));
      ei=fin[Math.floor(Math.random()*fin.length)].i;
    } else ei=pickLongExample(k,0);
    const ex=exsOf(k,0)[ei];
    const realIdx=IT(k).examples.indexOf(ex);markShown(k,0,ei);if(phase===1)used[k]=realIdx;
    const g=buildGap(ex.en,IT(k).head);if(!g)return;
    const sel=el('select','gapsel','');
    const p=el('div','sentence');p.append(document.createTextNode(g.pre),sel,document.createTextNode(g.post));
    const ru=el('div','ru-reveal hidden',esc(ex.ru||''));
    list.appendChild(p);list.appendChild(ru);rows.push({k,sel,g,ru});});
  wireBank(rows,tagRow,bank);
  box.appendChild(list);
  const check=el('button','btn pri','Проверить блок');box.appendChild(check);
  check.onclick=()=>{if(box.dataset.answered)return;
    if(rows.some(r=>!r.sel.value)){box.appendChild(el('div','fb warn','Заполните все пропуски'));return;}
    let bad=0;
    rows.forEach(r=>{const okAns=r.sel.value===IT(r.k).head;
      r.sel.style.borderColor=okAns?'var(--ok)':'var(--bad)';
      if(!okAns){bad++;r.sel.parentNode.appendChild(el('span','small mut',' → '+esc(IT(r.k).head)));
        SES&&SES.errors.push({k:r.k,si:0});}
      if(r.ru&&r.ru.textContent)r.ru.classList.remove('hidden');
      applySignal(r.k,0,'bank',okAns?'ok_fast':'wrong',todayStr());});
    save();box.dataset.answered='1';
    if(SES){if(phase===1){SES.orderA=rows.map(r=>r.k);SES.usedA=used;}SES.count+=rows.length;SES.okc+=rows.length-bad;}
    box.appendChild(el('div',bad?'fb warn':'fb ok','Верно '+(rows.length-bad)+' из '+rows.length));
    const n=el('button','btn pri','Дальше ⏎');n.onclick=()=>doneCb({});box.appendChild(n);box._next=n;};

/* ============ РАННЕР СЕССИИ ============ */
let SES=null;
/* Полный цикл дня 1 пачки: 5 этапов, без дневных ограничений */
function startUnitDay1(unitNo){
  const u=PACK.units.find(x=>x.unit===unitNo);
  let fresh=u.items.filter(k=>ST(k).st==='inbox');
  if(!fresh.length){
    const alive=u.items.filter(k=>['learning','review','mastered','problem'].includes(ST(k).st));
    if(alive.length)fresh=alive; else {startSession();return;}
  }
  const tasks=[];
  /* Этап 1: знакомство пачками по 5 с сопоставлением */
  for(let i=0;i<fresh.length;i+=5){
    const batch=fresh.slice(i,i+5);
    batch.forEach((k,j)=>tasks.push({kind:'introCard',k,idx:i+j+1,total:fresh.length,stage:1}));
    tasks.push({kind:'match5',keys:batch,stage:1});
  }
  /* Этап 2: узнавание всех слов в случайном порядке */
  shuffle(fresh).forEach(k=>tasks.push({kind:'learn',k,format:'mcq_rev',stage:2}));
  /* Этап 3: первый блок предложений (общий банк) */
  tasks.push({kind:'blockA',unit:unitNo,stage:3});
  /* Этап 4: восприятие на слух */
  shuffle(fresh).forEach(k=>tasks.push({kind:'audio',k,stage:4}));
  /* Этап 5: второй блок предложений — тот же формат, другие контексты */
  tasks.push({kind:'blockB',unit:unitNo,stage:5});
  tasks.push({kind:'unitDone',unit:unitNo});
  SES={tasks,i:0,errors:[],t0:Date.now(),count:0,okc:0,unitFlow:unitNo};pushNav();
  /* регистрация пачки */
  for(const k of fresh){ST(k).st='learning';ST(k).intro=ST(k).intro||todayStr();ST(k).learn=ST(k).learn||{ok:0,formats:[],prod:0,days:[]};}
  if(!S.meta.activeUnits.some(a=>a.unit===unitNo))S.meta.activeUnits.push({unit:unitNo,introDate:todayStr(),day1:false,testDone:false});
  save();showSession();
}
function startSession(){ /* повторения + конвейер закрепления */
  const tasks=buildSession(todayStr());
  if(!tasks.length){
    render('today');
    setTimeout(()=>{const t=$('#emptyMsg');if(t)t.classList.remove('hidden');},50);
    return;
  }
  SES={tasks,i:0,errors:[],t0:Date.now(),count:0,okc:0};pushNav();
  showSession();
}

function buildStageTasks(unitNo,n){
  const u=PACK.units.find(x=>x.unit===unitNo);
  const words=u.items.filter(k=>ST(k).st!=='archive');
  const t=[];
  if(n===1){for(let i=0;i<words.length;i+=5){const b=words.slice(i,i+5);
    b.forEach((k,j)=>t.push({kind:'introCard',k,idx:i+j+1,total:words.length,stage:1}));
    t.push({kind:'match5',keys:b,stage:1});}}
  else if(n===2)shuffle(words).forEach(k=>t.push({kind:'learn',k,format:'mcq_rev',stage:2}));
  else if(n===3)t.push({kind:'blockA',unit:unitNo,stage:3});
  else if(n===4)shuffle(words).forEach(k=>t.push({kind:'audio',k,stage:4}));
  else if(n===5)t.push({kind:'blockB',unit:unitNo,stage:5});
  return t;
}
function jumpToStage(n){
  if(!SES||!SES.unitFlow)return;
  let idx=SES.tasks.findIndex(t=>t.stage===n);
  if(idx<0){
    const add=buildStageTasks(SES.unitFlow,n);
    if(!add.length)return;
    let di=SES.tasks.findIndex(t=>t.kind==='unitDone');
    if(di<0)di=SES.tasks.length;
    SES.tasks.splice(di,0,...add);
    idx=di;
  }
  SES.i=idx;showSession();
}
function showSession(){
  const app=$('#app');app.innerHTML='';
  const total=SES.tasks.length;
  const head=el('div','row');
  head.appendChild(el('div','mut small','Шаг '+Math.min(SES.i+1,total)+' из '+total+(SES.unitFlow?' · пачка '+SES.unitFlow:'')));
  const quit=el('button','btn ghost small','Прервать');quit.onclick=()=>{addMinutes();render('today');};
  head.append(el('div','spacer'),quit);app.appendChild(head);
  const pb=el('div','pbar');pb.appendChild(el('div','',''));pb.firstChild.style.width=(SES.i/total*100)+'%';app.appendChild(pb);
  if(SES.unitFlow){
    const names=['Знакомство','Узнавание','Блок 1','На слух','Блок 2'];
    const a=S.meta.activeUnits.find(x=>x.unit===SES.unitFlow);
    const doneSt=(a&&a.stagesDone)||[];
    const cur=(SES.tasks[Math.min(SES.i,total-1)]||{}).stage||1;
    const stp=el('div','stepper');
    names.forEach((n,i)=>{const s=el('span','step'+(doneSt.includes(i+1)?' done':'')+(i+1===cur?' cur':''),n);
      s.title='Перейти к этапу';s.onclick=()=>jumpToStage(i+1);stp.appendChild(s);});
    app.appendChild(stp);
  }
  if(SES.i>=total){return sessionEnd(app);}
  const t=SES.tasks[SES.i];
  /* архивированные по ходу сессии слова пропускаются */
  if(t.k&&ST(t.k)&&ST(t.k).st==='archive'){SES.i++;showSession();return;}
  /* чекпоинт для возобновления */
  S.meta.paused={tasks:SES.tasks,i:SES.i,errors:SES.errors,count:SES.count,okc:SES.okc,unitFlow:SES.unitFlow||null,orderA:SES.orderA||null,usedA:SES.usedA||null};save();
  const centerKinds=new Set(['learn','review','relearn','introCard','audio','unitDone']);
  const box=el('div','card stage');app.appendChild(box);
  let target=box;
  if(centerKinds.has(t.kind)){/* бейдж сверху, содержимое по центру оставшегося пространства */}
  const done=res=>{
    if(res&&res.redo){showSession();return;}
    const pushRelearn=task=>{ /* возврат ошибки — в конец текущего этапа */
      let at=SES.tasks.length;
      if(t.stage){let j=SES.i+1;
        while(j<SES.tasks.length&&SES.tasks[j].stage===t.stage)j++;
        at=j;
      } else {const di=SES.tasks.findIndex(x=>x.kind==='unitDone');if(di>=0)at=di;}
      task.stage=t.stage;SES.tasks.splice(at,0,task);
    };
    if(t.kind==='learn'||t.kind==='review'){
      SES.count++;if(res&&!res.wrong)SES.okc++;
      if(res&&res.wrong&&res.k){SES.errors.push({k:res.k,si:res.si||0});
        pushRelearn({kind:'relearn',k:res.k,si:res.si||0,format:'mcq_rev'});}}
    if(res&&res.wrong&&t.kind==='audio')pushRelearn({kind:'relearn',k:res.k,si:0,format:'mcq_rev'});
    /* этап пройден, когда выполнена его последняя задача */
    if(SES.unitFlow&&t.stage){
      const nxt=SES.tasks[SES.i+1];
      if(!nxt||nxt.stage!==t.stage){
        const a=S.meta.activeUnits.find(x=>x.unit===SES.unitFlow);
        if(a){a.stagesDone=a.stagesDone||[];if(!a.stagesDone.includes(t.stage))a.stagesDone.push(t.stage);save();}
      }
    }
    SES.i++;showSession();
  };
  const kindLabel={review:'Повторение',learn:'Закрепление',relearn:'Возврат ошибки',introCard:'Новое слово',match5:'Сопоставление',blockA:'Предложения · блок 1',blockB:'Предложения · блок 2',audio:'На слух',story:'Итоговый тест',unitDone:'Итог'};
  box.appendChild(el('div','badge',kindLabel[t.kind]||''));
  if(centerKinds.has(t.kind)){target=el('div','qbody');box.appendChild(target);}
  if(t.kind==='introCard')renderIntroCard(t.k,t.idx,t.total,target,done);

function advisorCheck(acc){
  const a=S.meta.advisor;a.push({d:todayStr(),acc,min:day().min});while(a.length>5)a.shift();
  const last3=a.slice(-3);
  if(last3.length===3&&(last3.every(x=>x.min>90)||last3.every(x=>x.acc<75))){S.meta.adviceShow=true;}
  save();

function errorDigest(){
  const days=Object.keys(S.days).sort().slice(-7);
  const errs=[];
  for(const k of Object.keys(S.items)){const st=ST(k);
    for(const h of (st.hist||[]).slice(-30))if(h.r==='wrong'&&days.includes(h.d))errs.push({head:IT(k).head,f:h.f,d:h.d});
    if(st.s2)for(const h of (st.s2.hist||[]).slice(-20))if(h.r==='wrong'&&days.includes(h.d))errs.push({head:IT(k).head+' (знач. 2)',f:h.f,d:h.d});
  }
  const leeches=Object.keys(S.items).filter(k=>ST(k).st==='problem'||ST(k).lapDates.length>=2).map(k=>IT(k).head);
  const confu=[];for(const k of Object.keys(S.items)){const c=ST(k).confu||{};for(const k2 in c)if(c[k2]>=2)confu.push([IT(k).head,IT(k2)?IT(k2).head:k2,c[k2]]);}
  return JSON.stringify({period:days[0]+'…'+days[days.length-1],errors:errs,problem_words:leeches,confusions:confu},null,1);
}

function unitStatus(u){
  const sts=u.items.map(k=>ST(k).st);
  const a=S.meta.activeUnits.find(x=>x.unit===u.unit);
  if(sts.every(s=>s==='inbox'))return {code:'new',label:'не начата',btn:'Начать'};
  if(sts.some(s=>s==='learning')&&(!a||!a.day1)){
    const n=(a&&a.stagesDone&&a.stagesDone.length)||0;
    return {code:'resume',label:'этапы: '+n+' из 5',btn:'Продолжить',stageFrac:n/5};
  }
  if(a&&a.day1&&!a.testDone)return {code:'test',label:'ждёт итоговый тест',btn:'Итоговый тест'};
  const done=sts.filter(s=>s==='mastered').length;
  if(sts.every(s=>['review','mastered','archive','problem'].includes(s)))
    return {code:'srs',label:'в повторениях · усвоено '+done+'/'+u.items.length,btn:null};
  return {code:'mix',label:'в работе',btn:null};
}

  /* карта окна забывания */
  const c2=el('div','card');c2.appendChild(el('h3','','Где забывается: ошибки по ступеням'));
  const agg={};for(const d in S.days){const b=S.days[d].byStep||{};for(const s in b){agg[s]=agg[s]||{ok:0,bad:0};agg[s].ok+=b[s].ok;agg[s].bad+=b[s].bad;}}
  const tbl=el('table','t','<tr><th>Ступень</th><th>Ответов</th><th>Ошибок</th><th>Доля ошибок</th></tr>');
  STEPS.forEach((days2,i)=>{const a=agg['s'+i]||{ok:0,bad:0};const tot=a.ok+a.bad;
    tbl.innerHTML+='<tr><td>'+days2+' дн.</td><td>'+tot+'</td><td>'+a.bad+'</td><td>'+(tot?Math.round(a.bad/tot*100)+'%':'—')+'</td></tr>';});
  c2.appendChild(tbl);c2.appendChild(el('div','small mut','Высокий процент на конкретной ступени — сигнал сжать этот интервал (обсудим на разборе).'));
  app.appendChild(c2);
  /* активность */
  const c3=el('div','card');c3.appendChild(el('h3','','Активность (последние 10 недель)'));
  const heat=el('div','heat');const start=addDays(todayStr(),-69);
  for(let i=0;i<70;i++){const d=addDays(start,i);const n=(S.days[d]||{}).done||0;
    const cls=n===0?'':n<20?'a1':n<60?'a2':'a3';const s=el('i',cls);s.title=d+': '+n;heat.appendChild(s);}
  c3.appendChild(heat);app.appendChild(c3);
  /* проблемные */
  const probs=Object.keys(S.items).filter(k=>ST(k).st==='problem'||ST(k).lapses>=2)
    .sort((a,b)=>ST(b).lapses-ST(a).lapses).slice(0,20);
  if(probs.length){const c4=el('div','card');c4.appendChild(el('h3','','Проблемные слова'));
    probs.forEach(k=>{const r=el('div','dictrow');r.innerHTML='<b>'+esc(IT(k).head)+'</b><span class="mut small">'+esc(RU1(k))+'</span><span class="spacer"></span><span class="badge">'+ST(k).lapses+' срывов</span>';
      r.onclick=()=>wordModal(k);c4.appendChild(r);});
    app.appendChild(c4);}
}
function exportProgress(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='vocab_progress_'+todayStr()+'.json';a.click();
  S.meta.lastBackup=todayStr();save();setTimeout(()=>render(),300);
}
function viewData(app){
  const c=el('div','card');c.appendChild(el('h2','','Данные и настройки'));
  /* строгость и звук */
  c.appendChild(el('h3','','Проверка и звук'));
  const opts=[['strictTyping','Строгая проверка ввода (без допуска опечатки)'],['autoIntroSound','Автопроизношение на карточке знакомства'],['hardFinal','Усложнённый финальный блок: без подсказки-маски']];
  opts.forEach(([key,t])=>{const r=el('label','row small');const cb=el('input');cb.type='checkbox';cb.checked=!!S.settings[key];
    cb.onchange=()=>{S.settings[key]=cb.checked;save();};r.append(cb,document.createTextNode(' '+t));c.appendChild(r);});
  /* голос */
  const vr=el('div','row small');vr.appendChild(el('span','','Голос браузера: '));
  const sel=el('select','gapsel');sel.innerHTML='<option value="">авто (en-GB)</option>'+VOICES.map(v=>'<option'+(S.settings.voiceName===v.name?' selected':'')+'>'+esc(v.name)+'</option>').join('');
  sel.onchange=()=>{S.settings.voiceName=sel.value;save();};vr.appendChild(sel);
  const test=el('button','btn small','Тест');test.onclick=()=>speak('Negotiations stalled because neither side would give ground.');vr.appendChild(test);
  c.appendChild(vr);
  c.appendChild(el('div','small mut','При наличии рядом с тренажёром папки audio с записями произношения используются они; иначе — синтез речи браузера.'));
  app.appendChild(c);
  /* данные */
  const c2=el('div','card');c2.appendChild(el('h3','','Прогресс'));
  const r2=el('div','row');
  const addP=el('button','btn','Добавить пачки из файла');
  const fp=el('input');fp.type='file';fp.accept='.json';fp.style.display='none';
  fp.onchange=()=>{const f=fp.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{
      const j=JSON.parse(rd.result);
      if(!j.items||!j.units)throw 0;
      S.addon=S.addon||{units:[],items:{},stories:[]};
      const existing=new Set(Object.keys(PACK.items).map(x=>x.toLowerCase()));
      let maxU=Math.max(...PACK.units.map(u=>u.unit),...(S.addon.units.map(u=>u.unit)));
      let added=0,skipped=0;
      for(const u of j.units){
        const keep=u.items.filter(k=>!existing.has(k.toLowerCase()));
        skipped+=u.items.length-keep.length;
        if(!keep.length)continue;
        maxU++;const nu={unit:maxU,title:u.title,items:keep};
        S.addon.units.push(nu);
        for(const k of keep){const it=j.items[k];it.unit=maxU;S.addon.items[k]=it;existing.add(k.toLowerCase());added++;}
        const st=(j.stories||[]).find(s=>s.unit===u.unit);
        if(st){st.unit=maxU;S.addon.stories.push(st);}
      }
      save();alert('Добавлено слов: '+added+(skipped?', пропущено дублей: '+skipped:'')+'. Пачки появятся после обновления страницы.');location.reload();
    }catch(e){alert('Не удалось прочитать файл пачек');}};
    rd.readAsText(f);};
  addP.onclick=()=>fp.click();
  r2.append(addP,fp);
  const ex=el('button','btn','Экспорт прогресса');ex.onclick=exportProgress;
  const im=el('button','btn','Импорт прогресса');
  const fi=el('input');fi.type='file';fi.accept='.json';fi.style.display='none';
  fi.onchange=()=>{const f=fi.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{const j=JSON.parse(rd.result);if(!j.items)throw 0;
      if(!confirm('Текущий прогресс будет заменён импортированным. Перед заменой автоматически скачается резервная копия текущего. Продолжить?'))return;
      exportProgress();
      setTimeout(()=>{S=j;save();alert('Импортировано');location.reload();},400);
    }catch(e){alert('Не удалось прочитать файл');}};
    rd.readAsText(f);};
  im.onclick=()=>fi.click();
  const mg=el('button','btn','Объединить с файлом');
  const fm=el('input');fm.type='file';fm.accept='.json';fm.style.display='none';
  fm.onchange=()=>{const f=fm.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{
      const j=JSON.parse(rd.result);if(!j.items)throw 0;
      let taken=0,kept=0;
      /* добавочные пачки из файла */
      if(j.addon&&j.addon.units){S.addon=S.addon||{units:[],items:{},stories:[]};
        const have=new Set((S.addon.units||[]).map(u=>u.unit).concat(PACK.units.map(u=>u.unit)));
        for(const u of j.addon.units)if(!have.has(u.unit)){S.addon.units.push(u);Object.assign(S.addon.items,j.addon.items||{});}}
      /* по каждому слову выигрывает более продвинутая версия (длиннее история) */
      for(const k in j.items){
        const a=S.items[k],b=j.items[k];
        if(!a){S.items[k]=b;taken++;continue;}
        const la=(a.hist||[]).length+((a.s2&&a.s2.hist)||[]).length;
        const lb=(b.hist||[]).length+((b.s2&&b.s2.hist)||[]).length;
        if(lb>la){S.items[k]=b;taken++;}else kept++;
      }
      /* дневная статистика: объединение по датам */
      for(const d in (j.days||{})){
        if(!S.days[d])S.days[d]=j.days[d];
        else for(const f2 of ['done','ok','firstSeen','firstOk','min'])S.days[d][f2]=Math.max(S.days[d][f2]||0,j.days[d][f2]||0);
      }
      save();alert('Слияние выполнено. Обновлено слов: '+taken+', сохранено локальных: '+kept+'.');location.reload();
    }catch(e){alert('Не удалось прочитать файл');}};
    rd.readAsText(f);};
  mg.onclick=()=>fm.click();
  r2.append(mg,fm);
  const wipe=el('button','btn ghost','Сбросить всё');
  wipe.onclick=()=>{if(confirm('Удалить весь прогресс?')&&confirm('Точно? Это необратимо без бэкапа.')){localStorage.removeItem(LSKEY);location.reload();}};
  r2.append(ex,im,wipe,fi);c2.appendChild(r2);
  c2.appendChild(el('div','small mut','«Импорт прогресса» — полная замена (с автоматической резервной копией). «Объединить с файлом» — безопасный перенос между компьютером и телефоном: по каждому слову остаётся более продвинутая версия, ничего не затирается.'));
  app.appendChild(c2);
  const c3=el('div','card');c3.appendChild(el('h3','','О системе'));
  c3.appendChild(el('div','small mut','Пак: '+PACK.pack_id+' · единиц: '+Object.keys(PACK.items).length+' · юнитов: '+PACK.units.length+' · схема прогресса v1.<br>Горячие клавиши: <kbd>1–6</kbd> — выбор варианта, <kbd>Enter</kbd> — далее.'));
  app.appendChild(c3);
}
/* ============ СТАРТ ============ */
loadS();document.documentElement.setAttribute('data-theme',S.settings.theme==='light'?'light':'dark');render('today');

</script></body></html>
